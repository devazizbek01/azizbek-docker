{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Dockerfile write</title>
</head>
<body>

    <header class="head">
        <h1><a href="https://www.sobirjonov.uz/">Azizbek's blogs in docker site</a></h1>
    </header>

    {% for blog in blogs %}
        <div class="div">
            <h1 class="title">{{ blog.title }}</h1>
            <h4 class="text">{{ blog.text }}</h4>
            <h3 class="auth">{{ blog.auth }}</h3>
            <h2 class="datas">{{ blog.data }}</h2>
            <a href="https://t.me/azizbekcoder_channel" class="href"><i class="fa-brands fa-telegram"></i></a>
        </div>
    {% endfor %}
</body>
</html>
